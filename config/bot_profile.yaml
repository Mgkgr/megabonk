hotkeys:
  enabled: true
  toggle_vk: 119
  panic_vk: 123
runtime:
  state: "OFF"
  step_hz: 12
  window_title: Megabonk
  capture_backend: auto
  capture_log_errors: true
  window_focus_interval_s: 0.25
  templates_dir: templates
  overlay_enabled: true
  overlay_window: Megabonk Runtime Bot
  overlay_topmost: true
  overlay_transparent: true
  hud_debug_save_policy: on_fail_change
  hud_debug_min_interval_s: 15.0
  event_log_path: logs/runtime_events.jsonl
  event_log_interval_s: 0.2
  event_schema_version: runtime_events_v4
  upgrade_space_cooldown_s: 0.3
  cam_yaw_pixels: 160
  restart_cooldown_s: 3.5
  restart_hold_s: 3.5
  restart_wait_timeout_s: 8.0
  restart_max_attempts: 2
detection:
  grid_rows: 12
  grid_cols: 20
  enemy_hsv_lower:
  - 45
  - 80
  - 40
  enemy_hsv_upper:
  - 85
  - 255
  - 255
  enemy_min_area: 1200.0
  interact_threshold: 0.65
  use_onnx: false
  onnx_model_path: ''
  scene_memory_ttl_s: 2.0
  asset_refs_dir: art_refs/megabonk_unity_extracts
  enemy_catalog_path: config/enemy_catalog.json
  world_catalog_path: config/world_catalog.json
  projectile_catalog_path: config/projectile_catalog.json
  ocr_lexicon_path: config/ocr_lexicon.json
  memory_signatures_path: config/memory_signatures.json
  minimap_enabled: true
  memory_probe_enabled: true
  memory_poll_interval_s: 0.25
  enemy_classifier_mode: hybrid
mvp_policy:
  chest_policy: never_open
  auto_pick_upgrade_with_space: true
  user_picks_character_manually: true
  allow_map_scan_tab: false
  map_scan_interval_ticks: 180
max_policy:
  enabled: false
  explore_with_tab: true
  threat_scoring: true
  bunny_hop_enabled: true
  sliding_enabled: true
  collect_shrines_and_statues: true
navigation:
  profile: cautious
  lane_count: 5
  drop_risk_threshold: 0.58
  downhill_z_threshold: 0.18
  memory_required_for_slide: true
autopilot:
  click_cooldown_s: 0.5
  template_thresholds: {}
  heuristic:
    enemy_hsv_lower:
    - 45
    - 80
    - 40
    enemy_hsv_upper:
    - 85
    - 255
    - 255
    coin_hsv_lower:
    - 18
    - 120
    - 80
    coin_hsv_upper:
    - 35
    - 255
    - 255
    enemy_area_threshold: 1400.0
    coin_area_threshold: 900.0
    center_roi:
    - 0.35
    - 0.38
    - 0.3
    - 0.36
    center_lower_roi:
    - 0.35
    - 0.55
    - 0.3
    - 0.35
    stuck_diff_threshold: 3.0
    stuck_frames_required: 6
    stuck_escape_ticks: 16
    jump_cooldown: 30
    slide_cooldown: 24
    enemy_close_multiplier: 1.6
    scan_interval: 60
    scan_duration: 8
    scan_decision_ticks: 10
item_priorities:
- blood_tome
- katana
boss_schedule: []
